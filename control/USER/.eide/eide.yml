version: "4.1"
name: CONTROL
type: ARM
deviceName: null
packDir: null
srcDirs: []
virtualFolder:
  name: <virtual_root>
  files: []
  folders:
    - name: USER
      files:
        - path: main.c
        - path: stm32f10x_it.c
        - path: system_stm32f10x.c
      folders: []
    - name: HARDWARE
